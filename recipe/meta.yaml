{% set name = "pygrametl" %}
{% set version = "2.8" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pygrametl-{{ version }}.tar.gz
  sha256: 0e985789741879fa24ec9f779e7308e9cbff6dbd90bd51e10834080bb1650d28

build:
  number: 1
  noarch: python
  entry_points:
    - dttr = pygrametl.drawntabletesting.dttr:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - pygrametl
    - pygrametl.drawntabletesting
  commands:
    - pip check
    # - dttr --help return non-zero
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://pygrametl.org/
  license: BSD-2-Clause
  license_file: LICENSE.txt
  license_family: BSD
  summary: ETL programming in Python

extra:
  recipe-maintainers:
    - mariusvniekerk
