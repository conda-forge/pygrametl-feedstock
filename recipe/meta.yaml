{% set name = "pygrametl" %}
{% set version = "2.9" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pygrametl-{{ version }}.tar.gz
  sha256: 9b60bdc0b5f819bee9bdc81ff0adbc67704ec78ee92f89b023a311fefe051db1

build:
  number: 0
  noarch: python
  entry_points:
    - dttr = pygrametl.drawntabletesting.dttr:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.6
    - pip
  run:
    - python >=3.6

test:
  imports:
    - pygrametl
    - pygrametl.drawntabletesting
  commands:
    - pip check
    # - dttr --help return non-zero
  requires:
    - pip

about:
  home: http://pygrametl.org/
  license: BSD-2-Clause
  license_file: LICENSE.txt
  license_family: BSD
  summary: ETL programming in Python

extra:
  recipe-maintainers:
    - mariusvniekerk
